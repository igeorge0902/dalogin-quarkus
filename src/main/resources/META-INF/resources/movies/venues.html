<div class="breadcrumb">
    <a href="/login/left-sidebar.html">Movies</a>
    <span class="sep">›</span>
    <span class="current">Select Venue</span>
</div>

<div class="page-header" style="padding-top:10px;">
    <h2>Choose a Venue</h2>
    <p>Pick a cinema location to see available screenings.</p>
</div>

<div class="filter-bar">
    <input type="search" ng-model="q" placeholder="Filter venues..." aria-label="filter venues">
</div>

<div class="venue-grid">
    <a class="venue-card"
       ng-repeat="location in locations | filter:q as results"
       ng-href="mbooks-1/rest/book/dates/{{location.locationId}}/{{$routeParams.bookId}}">
        <img class="venue-img"
             ng-src="../simple-service-webapp/webapi/myresource{{location.thumbnail}}"
             alt="{{location.name}}"
             referrerpolicy="origin">
        <div class="venue-info">
            <h3>{{location.name}}</h3>
        </div>
    </a>
</div>

<div class="empty-state" ng-if="results.length === 0 && q">
    <h3>No venues found</h3>
    <p>Try a different search term.</p>
</div>
