<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register – SwiftCinemas</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="movies/css/cinemas.css" rel="stylesheet">

    <script src="jsR/sha512.js" type="text/javascript"></script>
    <script src="jsR/sha3.js" type="text/javascript"></script>
    <script src="jsR/hmac-sha512.js" type="text/javascript"></script>
    <script src="jsR/angular.min.js" type="text/javascript"></script>
    <script src="jsR/register.js" type="text/javascript"></script>
    <script src="jsR/enc-base64-min.js" type="text/javascript"></script>
    <script src="jsR/angular-utf8-base64.min.js" type="text/javascript"></script>
    <script src="jsR/ng-device-detector.min.js" type="text/javascript"></script>
    <script src="jsR/re-tree/re-tree.min.js" type="text/javascript"></script>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
    <div class="page-wrap">
        <span class="brand">🎬 SwiftCinemas</span>
        <nav>
            <a href="main.html">Home</a>
            <a href="left-sidebar.html">Movies</a>
            <a href="registerbar.html" class="active">Register</a>
            <a href="loginbar.html">Login</a>
        </nav>
    </div>
</div>

<div class="page-wrap" data-ng-app="hmac">

    <div class="page-header">
        <h1>Create Account</h1>
        <p>Register for SwiftCinemas to start booking tickets.</p>
    </div>

    <div class="auth-card">
        <div ng-controller="RegController">
            <form class="auth-form" novalidate>
                <div class="form-field">
                    <label for="voucher_">Voucher Code</label>
                    <input id="voucher_" name="voucher_" ng-change="fields()"
                           ng-model="voucher_" type="text" placeholder="Enter voucher code">
                </div>
                <div class="form-field">
                    <label for="username">Username</label>
                    <input id="username" name="username" ng-change="search(); fields()"
                           ng-model="username" type="text" placeholder="Choose a username">
                </div>
                <div class="form-field">
                    <label for="email">Email</label>
                    <input id="email" name="email" ng-change="email_search(); fields()"
                           ng-model="email" type="text" placeholder="Enter email address">
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <input id="password" name="password" ng-change="fields()"
                           ng-model="password" type="password" placeholder="Choose a password">
                </div>

                <div class="alert alert-danger" ng-show="errorMsg_User" role="alert">{{errorMsg_User}}</div>
                <div class="alert alert-success" ng-show="successMsg_User" role="alert">{{successMsg_User}}</div>
                <div class="alert alert-danger" ng-show="errorMsg" role="alert">{{errorMsg.name}}</div>
                <div class="alert alert-success" ng-show="successMsg" role="alert">{{successMsg}}</div>

                <div class="form-actions">
                    <button class="btn btn-primary" ng-click="register()" ng-disabled="modelP.isDisabled">Register</button>
                    <input class="btn btn-secondary" type="reset" value="Cancel">
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="site-footer">
    SwiftCinemas &copy; 2026 &middot; Powered by Quarkus
</div>

</body>

</html>
