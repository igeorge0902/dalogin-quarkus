<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movies – SwiftCinemas</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="movies/css/cinemas.css" rel="stylesheet">

    <script src="movies/oldAngular/angular.min.js" type="text/javascript"></script>
    <script src="movies/js/hmac-sha512.js" type="text/javascript"></script>
    <script src="movies/js/script.js" type="text/javascript"></script>
    <script src="movies/js/enc-base64-min.js" type="text/javascript"></script>
    <script src="movies/js/angular-utf8-base64.min.js" type="text/javascript"></script>
    <script src="movies/angular/angular-animate.js" type="text/javascript"></script>
    <script src="movies/angular/angular-route.min.js" type="text/javascript"></script>
    <script src="movies/oldAngular/angular-cookies.min.js" type="text/javascript"></script>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
    <div class="page-wrap">
        <span class="brand">🎬 SwiftCinemas</span>
        <nav>
            <a href="main.html">Home</a>
            <a href="left-sidebar.html" class="active">Movies</a>
            <a href="registerbar.html">Register</a>
            <a href="loginbar.html">Login</a>
        </nav>
    </div>
</div>

<!-- Main content -->
<div class="page-wrap" ng-app="ngRepeat">
    <div ng-controller="repeatController">

        <!-- Page header -->
        <div class="page-header">
            <h1>Now Showing</h1>
            <p>Browse our latest movies and book your tickets online.</p>
        </div>

        <!-- Route view (for venues / dates sub-pages) -->
        <div ng-view></div>

        <!-- Movies list (only shown on the main movies path) -->
        <div ng-switch on="$location.path()">
            <div ng-switch-when="/left-sidebar.html">

                <!-- Filter bar -->
                <div class="filter-bar">
                    <input type="search" ng-model="q" placeholder="Search movies..." aria-label="filter movies">
                </div>

                <!-- Loading indicator -->
                <div class="loading" ng-show="movies.length === 0 && !loadError">
                    <div class="spinner"></div>
                    <p>Loading movies...</p>
                </div>

                <!-- Movie grid -->
                <div class="movie-grid">
                    <a class="movie-card"
                       ng-repeat="movie in movies | filter:q as results"
                       ng-href="mbooks-1/rest/book/venue/v2/{{movie.movieId}}">
                        <img class="poster"
                             ng-src="../simple-service-webapp/webapi/myresource{{movie.large_picture}}"
                             alt="{{movie.name}}">
                        <div class="info">
                            <h3>{{movie.name}}</h3>
                            <p>{{movie.detail}}</p>
                            <span class="imdb-link" ng-if="movie.iMDB_url"
                                  ng-click="$event.stopPropagation()">
                                <a ng-href="{{movie.iMDB_url}}" target="_blank" rel="noopener">IMDb ↗</a>
                            </span>
                        </div>
                    </a>
                </div>

                <!-- No results -->
                <div class="empty-state" ng-if="results.length === 0 && q">
                    <h3>No movies found</h3>
                    <p>Try a different search term.</p>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="site-footer">
    SwiftCinemas &copy; 2026 &middot; Powered by Quarkus
</div>

</body>

</html>
