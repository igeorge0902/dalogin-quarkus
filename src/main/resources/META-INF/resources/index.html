<!DOCTYPE html>
<html lang="en" ng-app="hmac">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login – SwiftCinemas</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="movies/css/cinemas.css" rel="stylesheet">

    <script src="jsR/angular.min.js" type="text/javascript"></script>
    <script src="jsR/sha3.js" type="text/javascript"></script>
    <script src="jsR/sha512.js" type="text/javascript"></script>
    <script src="jsR/hmac-sha512.js" type="text/javascript"></script>
    <script src="jsR/app.js" type="text/javascript"></script>
    <script src="jsR/enc-base64-min.js" type="text/javascript"></script>
    <script src="jsR/angular-utf8-base64.min.js" type="text/javascript"></script>
    <script src="jsR/ng-device-detector.min.js" type="text/javascript"></script>
    <script src="jsR/re-tree/re-tree.min.js" type="text/javascript"></script>
    <script src="jsR/angular-animate.js" type="text/javascript"></script>
    <script src="jsR/angular-route.min.js" type="text/javascript"></script>
</head>

<body>

<div class="page-wrap" style="min-height:100vh; display:flex; flex-direction:column; justify-content:center;">

    <div style="text-align:center; margin-bottom:30px;">
        <span style="font-size:2.5em;">🎬</span>
        <h1 style="margin-top:8px;">SwiftCinemas</h1>
    </div>

    <div class="auth-card" ng-controller="LoginController">
        <form class="auth-form" novalidate>
            <div class="form-field">
                <label for="username">Username</label>
                <input autocomplete="username" id="username" name="username"
                       ng-model="username" type="text" placeholder="Enter username">
            </div>
            <div class="form-field">
                <label for="password">Password</label>
                <input autocomplete="current-password" id="password" name="password"
                       ng-model="password" type="password" placeholder="Enter password">
            </div>

            <div class="alert alert-danger" ng-show="errorMsg" role="alert">{{errorMsg}}</div>
            <div class="alert alert-success" ng-show="successMsg" role="alert">{{successMsg}}</div>

            <div class="form-actions">
                <button class="btn btn-primary" ng-click="login()">Login</button>
                <input class="btn btn-secondary" type="reset" value="Cancel">
            </div>
        </form>
    </div>

    <div style="text-align:center; margin-top:16px;">
        <div ng-controller="ForgetPSWController">
            <a href="../login/changepassword.html" style="color:var(--azure); font-size:0.9em;">Forgot password?</a>
        </div>
    </div>
</div>

</body>

</html>
