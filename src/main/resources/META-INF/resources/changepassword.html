<!DOCTYPE html>
<html lang="en" ng-app="hmac">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password – SwiftCinemas</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="movies/css/cinemas.css" rel="stylesheet">

    <script src="jsR/angular.min.js" type="text/javascript"></script>
    <script src="jsR/sha3.js" type="text/javascript"></script>
    <script src="jsR/sha512.js" type="text/javascript"></script>
    <script src="jsR/hmac-sha512.js" type="text/javascript"></script>
    <script src="jsR/app.js" type="text/javascript"></script>
    <script src="jsR/enc-base64-min.js" type="text/javascript"></script>
    <script src="jsR/angular-utf8-base64.min.js" type="text/javascript"></script>
    <script src="jsR/ng-device-detector.min.js" type="text/javascript"></script>
    <script src="jsR/re-tree/re-tree.min.js" type="text/javascript"></script>
    <script src="js/lib/aes.js" type="text/javascript"></script>
    <script src="js/lib/pbkdf2.js" type="text/javascript"></script>
    <script src="js/AesUtil.js" type="text/javascript"></script>
</head>

<body>

<!-- Top bar -->
<div class="top-bar">
    <div class="page-wrap">
        <span class="brand">🎬 SwiftCinemas</span>
        <nav>
            <a href="main.html">Home</a>
            <a href="left-sidebar.html">Movies</a>
            <a href="registerbar.html">Register</a>
            <a href="loginbar.html">Login</a>
        </nav>
    </div>
</div>

<div class="page-wrap">
    <div class="page-header">
        <h1>Reset Password</h1>
        <p>Enter your email to receive a reset code.</p>
    </div>

    <div class="auth-card" ng-controller="ForgetPSWController">
        <form class="auth-form" novalidate>
            <!-- Step 1: Email -->
            <div class="form-field">
                <label for="email">Email</label>
                <input id="email" name="email" ng-change="clearErrorMsg()"
                       ng-disabled="modelE.isDisabled" ng-model="email"
                       required type="text" placeholder="Enter your email">
            </div>

            <div class="alert alert-danger" ng-show="errorMsg" role="alert">{{errorMsg}}</div>
            <div class="alert alert-success" ng-show="successMsg" role="alert">{{successMsg}}</div>

            <div class="form-actions" style="margin-bottom:24px;">
                <button class="btn btn-primary" ng-click="forgetPsw()" ng-disabled="modelE.isDisabled">
                    Request Reset Code
                </button>
            </div>

            <!-- Step 2: Confirmation Code -->
            <div class="form-field">
                <label for="confirmationCode">Confirmation Code</label>
                <input id="confirmationCode" name="confirmationCode"
                       ng-disabled="modelC.isDisabled" ng-model="confirmationCode"
                       required type="text" placeholder="Enter code from email">
            </div>

            <div class="alert alert-danger" ng-show="error_Msg" role="alert">{{error_Msg}}</div>
            <div class="alert alert-success" ng-show="success_Msg" role="alert">{{success_Msg}}</div>

            <div class="form-actions" style="margin-bottom:24px;">
                <button class="btn btn-primary" ng-click="enterCode()" ng-disabled="modelC.isDisabled">
                    Verify Code
                </button>
            </div>

            <!-- Step 3: New Password -->
            <div class="form-field">
                <label for="password">New Password</label>
                <input ng-disabled="modelP.isDisabled" ng-model="password"
                       type="password" placeholder="Enter new password">
            </div>

            <div class="alert alert-danger" ng-show="errorMsg_" role="alert">{{errorMsg_}}</div>
            <div class="alert alert-success" ng-show="successMsg_" role="alert">{{successMsg_}}</div>

            <div class="form-actions">
                <button class="btn btn-primary" ng-click="changePSw()" ng-disabled="modelP.isDisabled">
                    Change Password
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Footer -->
<div class="site-footer">
    SwiftCinemas &copy; 2026 &middot; Powered by Quarkus
</div>

</body>

</html>
