# --- DataSource configuration ---
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=sqluser
quarkus.datasource.password=sqluserpw
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/login_
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.acquisition-timeout=5S
quarkus.http.root-path=/login
quarkus.http.static-resources.index-page=index.html

# --- OpenTelemetry ---
quarkus.otel.enabled=true
quarkus.otel.traces.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://localhost:4318
quarkus.otel.exporter.otlp.protocol=http/protobuf
quarkus.otel.traces.exporter=otlp
quarkus.otel.service.name=dalogin-quarkus
quarkus.otel.traces.sampler=parentbased_always_on
